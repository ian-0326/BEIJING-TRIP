<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京奢華散策 - 個人旅行手冊</title>
    <style>
        :root {
            --bg-color: #F9F7F2;
            --main-text: #4A4A4A;
            --accent-green: #7D8E7E;
            --line-color: #D1CEC7;
            --info-text: #999;
        }

        body {
            background-color: var(--bg-color);
            color: var(--main-text);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 40px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        header {
            text-align: center;
            border-bottom: 1px solid var(--line-color);
            padding-bottom: 30px;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 6px;
            margin: 10px 0;
            font-weight: 300;
        }

        .subtitle {
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--accent-green);
        }

        .day-section {
            margin-bottom: 40px;
        }

        .day-header {
            font-size: 1.1rem;
            background-color: var(--accent-green);
            color: white;
            display: inline-block;
            padding: 4px 20px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .itinerary-list {
            display: grid;
            grid-template-columns: 30px 1fr;
            position: relative;
        }

        .itinerary-item {
            display: contents;
        }

        .dot-container {
            grid-column: 1;
            display: flex;
            justify-content: center;
            position: relative;
            padding-top: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            z-index: 2;
        }

        .dot-container::after {
            content: "";
            position: absolute;
            top: 15px;
            bottom: -15px;
            width: 1px;
            background-color: var(--line-color);
            z-index: 1;
        }

        .day-section .itinerary-item:last-child .dot-container::after {
            display: none;
        }

        .content {
            grid-column: 2;
            padding-bottom: 30px;
        }

        .event-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .event-info {
            font-size: 0.85rem;
            color: var(--info-text);
            display: block;
            line-height: 1.4;
        }

        /* 照片樣式：統一尺寸為橫式 */
        .event-photo {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9; /* 強制橫式比例 */
            object-fit: cover;   /* 確保圖片填滿且不變形 */
            border-radius: 4px;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #CCC;
            margin-top: 40px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="subtitle">Personal Travel Itinerary</div>
        <h1>北京·皇城慢旅</h1>
        <p>2026.04.30 — 05.05</p>
    </header>

    <div class="day-section">
        <div class="day-header">04.30</div>
        <div class="itinerary-list">
            <div class="itinerary-item">
                <div class="dot-container"><div class="dot"></div></div>
                <div class="content">
                    <div class="event-title">JW Marriott Hotel Beijing Central</div>
                    <img src="hotel.jpg" alt="JW Marriott Hotel Beijing Central" class="event-photo">
                </div>
            </div>
            <div class="itinerary-item">
                <div class="dot-container"><div class="dot"></div></div>
                <div class="content">
                    <div class="event-title">天壇公園</div>
                    <span class="event-info">營業時間：旺季 06:00 - 22:00</span>
                    <img src="tiantan.jpg" alt="天壇公園" class="event-photo">
                </div>
            </div>
            <div class="itinerary-item">
                <div class="dot-container"><div class="dot"></div></div>
                <div class="content">
                    <div class="event-title">前門大街</div>
                    <span class="event-info">營業時間：約 08:00 - 22:00 (各店舖不同)</span>
                    <img src="qianmen.jpg" alt="前門大街" class="event-photo">
                </div>
            </div>
        </div>
    </div>

    <footer>
        DESIGNED FOR PERSONAL JOURNEY
    </footer>
</div>

</body>
</html>
